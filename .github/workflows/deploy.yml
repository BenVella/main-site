name: Deploy Astro Site

on:
  push:
    branches: ['main', 'develop']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build production site
        env:
          SITE_BASE_PATH: /
          SITE_URL: https://www.bennetvella.com
          PUBLIC_SITE_ENV: production
        run: npm run build

      - name: Prepare production publish tree
        run: |
          mkdir -p /tmp/publish
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add /tmp/gh-pages origin/gh-pages
            rsync -a /tmp/gh-pages/ /tmp/publish/
          fi
          rsync -a --delete --exclude staging dist/ /tmp/publish/
          cp public/CNAME /tmp/publish/CNAME
          touch /tmp/publish/.nojekyll

      - name: Deploy production to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: /tmp/publish
          clean: true

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build staging site
        env:
          SITE_BASE_PATH: /staging/
          SITE_URL: https://www.bennetvella.com
          PUBLIC_SITE_ENV: staging
        run: npm run build

      - name: Prepare staging publish tree
        run: |
          mkdir -p /tmp/publish/staging
          if git ls-remote --exit-code --heads origin gh-pages; then
            git fetch origin gh-pages
            git worktree add /tmp/gh-pages origin/gh-pages
            rsync -a /tmp/gh-pages/ /tmp/publish/
          fi
          rsync -a --delete dist/ /tmp/publish/staging/
          cp public/CNAME /tmp/publish/CNAME
          touch /tmp/publish/.nojekyll

      - name: Deploy staging to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: /tmp/publish
          clean: true
