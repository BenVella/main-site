name: Deploy Astro Site

on:
  push:
    branches: ['main', 'develop']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build production site
        env:
          SITE_BASE_PATH: /
          SITE_URL: https://www.bennetvella.com
          PUBLIC_SITE_ENV: production
        run: npm run build

      - name: Deploy production to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          clean: true
          clean-exclude: |
            staging

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build staging site
        env:
          SITE_BASE_PATH: /staging/
          SITE_URL: https://www.bennetvella.com
          PUBLIC_SITE_ENV: staging
        run: npm run build

      - name: Deploy staging to gh-pages/staging
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: dist
          target-folder: staging
          clean: true
