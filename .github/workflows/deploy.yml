name: Deploy Astro Site

on:
  push:
    branches: ['main', 'develop']
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-production:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate release metadata
        id: release
        run: node scripts/generate-release-metadata.mjs

      - name: Build production site
        env:
          SITE_BASE_PATH: /
          SITE_URL: https://www.bennetvella.com
          PUBLIC_SITE_ENV: production
          PUBLIC_SITE_VERSION: ${{ steps.release.outputs.site_version }}
          PUBLIC_RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          PUBLIC_BUILD_TIMESTAMP: ${{ steps.release.outputs.build_timestamp }}
          PUBLIC_STAGING_ROOT_PATH: /staging/
        run: npm run build

      - name: Prepare production publish tree
        uses: ./.github/actions/prepare-pages-publish
        with:
          mode: production

      - name: Deploy production to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: /tmp/publish
          clean: true

      - name: Create release tag
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          SITE_VERSION: ${{ steps.release.outputs.site_version }}
          BUILD_TIMESTAMP: ${{ steps.release.outputs.build_timestamp }}
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com
          git tag -a "$RELEASE_TAG" -m "Release $SITE_VERSION ($RELEASE_TAG) built on $BUILD_TIMESTAMP"
          git push origin "$RELEASE_TAG"

  deploy-staging:
    if: github.ref == 'refs/heads/develop'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build staging site
        env:
          SITE_BASE_PATH: /staging/
          SITE_URL: https://www.bennetvella.com
          PUBLIC_SITE_ENV: staging
          PUBLIC_STAGING_ROOT_PATH: /staging/
        run: npm run build

      - name: Prepare staging publish tree
        uses: ./.github/actions/prepare-pages-publish
        with:
          mode: staging
          github_repository: ${{ github.repository }}
          github_token: ${{ github.token }}

      - name: Deploy staging to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: /tmp/publish
          clean: true
