<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">MuleSoft flow workbench collage tile</title>
  <desc id="desc">Stylized representation of Mule flow components, subflows, and palette panel.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5f7fb"/>
      <stop offset="1" stop-color="#d9e1ee"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#5a6780" flood-opacity="0.22"/>
    </filter>
  </defs>
  <rect width="1200" height="675" fill="url(#bg)"/>
  <rect x="25" y="35" width="740" height="605" rx="10" fill="#eef3fa" stroke="#8aa0c3" stroke-width="3"/>
  <rect x="800" y="35" width="375" height="605" rx="10" fill="#f8fbff" stroke="#c5d1e5"/>

  <g font-family="Arial, sans-serif" fill="#53627d">
    <text x="50" y="70" font-size="24" font-weight="700">flow_component_ex</text>
    <text x="835" y="70" font-size="22" font-weight="700">Mule Palette</text>
  </g>

  <g filter="url(#softShadow)">
    <rect x="55" y="110" width="170" height="110" rx="14" fill="#ffffff" stroke="#cad5e7"/>
    <rect x="265" y="110" width="170" height="110" rx="14" fill="#ffffff" stroke="#cad5e7"/>
    <rect x="475" y="110" width="220" height="110" rx="14" fill="#ffffff" stroke="#cad5e7"/>

    <circle cx="140" cy="165" r="34" fill="#5e67eb"/>
    <circle cx="350" cy="165" r="34" fill="#2fbb71"/>
    <circle cx="555" cy="165" r="34" fill="#5e67eb"/>
  </g>

  <g stroke="#55617a" stroke-width="4" fill="none" opacity="0.85">
    <path d="M180 165H230"/>
    <path d="M390 165H455"/>
  </g>

  <g font-family="Arial, sans-serif" font-size="20" fill="#4f5f7a">
    <text x="95" y="210">Scheduler</text>
    <text x="298" y="210">Set Payload</text>
    <text x="500" y="210">Flow Reference</text>
  </g>

  <g>
    <rect x="835" y="110" width="300" height="480" rx="10" fill="#ffffff" stroke="#d0d9e9"/>
    <g font-family="Arial, sans-serif" font-size="20" fill="#3f4b60">
      <text x="860" y="160">Core</text>
      <text x="860" y="202">HTTP</text>
      <text x="860" y="244">Sockets</text>
      <text x="860" y="286">Flow Reference</text>
      <text x="860" y="328">Logger</text>
      <text x="860" y="370">Transform Message</text>
      <text x="860" y="412">Error Handler</text>
      <text x="860" y="454">On Error Continue</text>
      <text x="860" y="496">On Error Propagate</text>
    </g>
  </g>

  <g opacity="0.88">
    <rect x="55" y="285" width="640" height="160" rx="10" fill="#ffffff" stroke="#cad5e7"/>
    <circle cx="140" cy="350" r="34" fill="#5e67eb"/>
    <circle cx="555" cy="350" r="34" fill="#5e67eb"/>
    <text x="95" y="402" font-family="Arial, sans-serif" font-size="20" fill="#4f5f7a">Transform Message</text>
    <text x="494" y="402" font-family="Arial, sans-serif" font-size="20" fill="#4f5f7a">Flow Ref</text>
  </g>
</svg>
